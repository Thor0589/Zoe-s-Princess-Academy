<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zoe's Princess Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            /* Magical pastel gradient background */
            background: linear-gradient(135deg, #fdfcfe 0%, #f4faeb 50%, #e6f7ff 100%);
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            min-height: 100vh;
            margin: 0;
            padding: 8px; /* Space for the gold frame */
            box-sizing: border-box;
        }
        
        .app-frame {
            border: 4px solid #ebd373;
            border-radius: 16px;
            min-height: calc(100vh - 16px);
            box-shadow: inset 0 0 20px rgba(255, 215, 0, 0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Hardware Accelerated Animations */
        @keyframes bounce-slight { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .animate-bounce-slight { animation: bounce-slight 2s infinite; }
        @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }

        /* Oversized Touch Targets for iPad */
        .btn-kid {
            transition: all 0.2s ease;
            box-shadow: 0 8px 0px rgba(0,0,0,0.1);
        }
        .btn-kid:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0px rgba(0,0,0,0.1);
        }
        .hidden { display: none !important; }

        .home-shell {
            max-width: 960px;
            margin: 0 auto;
            padding: 2px 0 18px;
            text-align: center;
        }

        .magic-book {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 112px;
            height: 78px;
            margin: 0 auto 6px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.48);
            font-size: 54px;
            filter: drop-shadow(0 8px 10px rgba(147, 102, 37, 0.15));
        }

        .home-title {
            margin: 0;
            font-size: clamp(2rem, 5vw, 3.2rem);
            line-height: 1.05;
            font-weight: 800;
            color: #1f2937;
        }

        .home-subtitle {
            margin: 8px auto 10px;
            font-size: clamp(1rem, 2.3vw, 1.55rem);
            line-height: 1.25;
            font-weight: 600;
            color: #475569;
        }

        .princess-greeting-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 0 auto 16px;
            padding: 7px 14px;
            border: 2px solid rgba(235, 211, 115, 0.85);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.78);
            box-shadow: 0 8px 18px rgba(148, 121, 45, 0.12);
            color: #475569;
            font-size: 0.95rem;
            font-weight: 800;
        }

        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
            width: 100%;
        }

        .subject-card {
            min-height: 126px;
            position: relative;
            overflow: hidden;
            border: 0;
            border-radius: 28px;
            padding: 24px 28px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            text-align: left;
            color: white;
            box-shadow: 0 10px 0 rgba(31, 41, 55, 0.12), 0 18px 26px rgba(31, 41, 55, 0.12);
        }

        .subject-card.wide { grid-column: 1 / -1; }

        .subject-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 88% 42%, rgba(255,255,255,0.28), transparent 25%),
                        radial-gradient(circle at 10% 85%, rgba(255,255,255,0.22), transparent 20%);
            pointer-events: none;
        }

        .subject-card-blue { background: linear-gradient(135deg, #60a5fa, #3b82f6); }
        .subject-card-pink { background: linear-gradient(135deg, #f472b6, #db4f9c); }
        .subject-card-green { background: linear-gradient(135deg, #6ee7a8, #34c779); }
        .subject-card-purple { background: linear-gradient(135deg, #b982f4, #8b5cf6); }

        .subject-label {
            position: relative;
            z-index: 2;
            max-width: 60%;
            font-size: clamp(1.65rem, 3vw, 2.45rem);
            line-height: 1.08;
            font-weight: 800;
            text-shadow: 0 2px 9px rgba(31, 41, 55, 0.2);
        }

        .subject-icon {
            display: inline-block;
            margin-right: 10px;
            font-size: 0.9em;
            vertical-align: middle;
        }

        .subject-art-frame {
            position: absolute;
            right: 8px;
            bottom: -12px;
            z-index: 1;
        }

        .subject-card.wide .subject-art-frame {
            right: 28px;
            bottom: -18px;
        }

        .subject-art {
            width: 132px;
            height: 132px;
            border-radius: 999px;
            object-fit: cover;
            border: 4px solid rgba(255,255,255,0.64);
            box-shadow: 0 12px 22px rgba(31, 41, 55, 0.2);
        }

        .subject-card.wide .subject-art {
            width: 160px;
            height: 160px;
        }

        @media (max-width: 700px) {
            .home-shell { padding-top: 0; }
            .magic-book {
                width: 84px;
                height: 58px;
                margin-bottom: 4px;
                font-size: 40px;
            }
            .home-subtitle { margin-bottom: 8px; }
            .princess-greeting-pill {
                margin-bottom: 12px;
                font-size: 0.84rem;
                padding: 6px 10px;
            }
            .subjects-grid { grid-template-columns: 1fr; }
            .subject-card {
                min-height: 104px;
                padding: 18px 20px;
                border-radius: 22px;
            }
            .subject-label {
                max-width: 68%;
                font-size: 1.65rem;
            }
            .subject-art,
            .subject-card.wide .subject-art {
                width: 104px;
                height: 104px;
            }
            .subject-card.wide .subject-art-frame,
            .subject-art-frame {
                right: 8px;
                bottom: -10px;
            }
        }
    </style>
</head>

        function selectRandomPrincess() {
            return princesses[Math.floor(Math.random() * princesses.length)];
        }

        function isRestrictedImageEnvironment() {
            return location.protocol === 'file:' || /iPhone|iPad|iPod/i.test(navigator.userAgent) || Boolean(window.webkit && window.webkit.messageHandlers);
        }

        const restrictedImageEnvironment = isRestrictedImageEnvironment();

        function getPrincessByName(name) {
            return princesses.find((princess) => princess.name === name);
        }

        function getPrincessImageSrc(princess) {
            return princess.image;
        }

        function renderPrincessImage(princess, imageClass, style = '') {
            const loadingText = imageClass.includes('h-10') ? '👑' : 'Loading image...';
            return `
                <span class="inline-flex ${imageClass.includes('subject-art') ? 'subject-art-frame' : ''}" data-princess-frame>
                    <span class="${imageClass} flex items-center justify-center bg-amber-50 p-3 text-center text-sm font-bold text-slate-500" style="${style}" data-princess-loading>${loadingText}</span>
                    <img alt="${princess.name} princess image" data-princess-image data-princess-name="${princess.name}" class="${imageClass} hidden" style="${style}">
                </span>
            `;
        }

        function testImageSource(src) {
            return new Promise((resolve, reject) => {
                if (!src) {
                    reject(new Error('Missing image source'));
                    return;
                }

                const tester = new Image();
                tester.onload = () => resolve(src);
                tester.onerror = () => reject(new Error('Image source failed'));
                tester.src = src;
            });
        }

        async function loadPrincessImage(img) {
            const princess = getPrincessByName(img.dataset.princessName);
            const loading = img.parentElement.querySelector('[data-princess-loading]');
            if (!princess) {
                if (loading) loading.textContent = 'Princess image unavailable';
                return;
            }

            const sources = [princess.image, princess.base64].filter(Boolean);
            for (const source of sources) {
                try {
                    const loadedSource = await testImageSource(source);
                    img.src = loadedSource;
                    img.dataset.imageSource = loadedSource.startsWith('data:') ? 'base64' : 'local';
                    img.classList.remove('hidden');
                    if (loading) loading.classList.add('hidden');
                    return;
                } catch (error) {
                    // Try the next source. iOS Shortcuts often reaches this path for local files.
                }
            }

            img.removeAttribute('src');
            if (loading) {
                loading.classList.remove('hidden');
                loading.textContent = 'Princess image unavailable';
            }
        }

        function initializePrincessImages(root = document) {
            root.querySelectorAll('img[data-princess-image]').forEach((img) => loadPrincessImage(img));
        }

        state.princess = selectRandomPrincess();

        // --- INIT & UTILS ---
        function jsString(value) {
            return JSON.stringify(String(value)).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
        }

        function init() {
            updateStarDisplay();
            navigate('hub');
            document.body.addEventListener('click', unlockAudio, { once: true });
            document.body.addEventListener('touchstart', unlockAudio, { once: true });

            if ('speechSynthesis' in window) {
                availableVoices = window.speechSynthesis.getVoices();
                if (speechSynthesis.onvoiceschanged !== undefined) {
                    speechSynthesis.onvoiceschanged = () => { availableVoices = window.speechSynthesis.getVoices(); };
                }
            }
        }

        function toggleLanguage(forceLang = null) {
            state.lang = forceLang || (state.lang === 'en' ? 'es' : 'en');
            document.getElementById('lang-toggle-btn').innerText = state.lang === 'en' ? '🇺🇸' : '🇲🇽';
            const appTitle = document.getElementById('app-title');
            if (appTitle) appTitle.innerText = uiText[state.lang].title;
            updateStarDisplay();
            navigate('hub');
        }

        function saveStars() {
            localStorage.setItem('zoeStats', JSON.stringify(state.stars));
            updateStarDisplay();
        }

        function updateStarDisplay() {
            document.getElementById('star-count-header').innerText = state.stars[state.lang];
        }

        function unlockAudio() {
            if(!synthEnabled && 'speechSynthesis' in window) {
                const u = new SpeechSynthesisUtterance('');
                u.volume = 0;
                window.speechSynthesis.speak(u);
                synthEnabled = true;
            }
        }

        function speak(text, rate = 0.85, pitch = 1.2) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            
            window.currentUtterance = new SpeechSynthesisUtterance(text);
            window.currentUtterance.rate = rate; 
            window.currentUtterance.pitch = pitch; 
            
            const targetLangCode = state.lang === 'es' ? 'es-MX' : 'en-US';
            window.currentUtterance.lang = targetLangCode;
            
            if (availableVoices.length === 0) availableVoices = window.speechSynthesis.getVoices();
            const preferredVoice = availableVoices.find(v => v.lang.includes(targetLangCode.split('-')[0]) && (v.name.includes('Samantha') || v.name.includes('Female') || v.name.includes('Google') || v.name.includes('Paulina')));
            if (preferredVoice) window.currentUtterance.voice = preferredVoice;

            window.speechSynthesis.speak(window.currentUtterance);
        }

        function getFeedback(isGood) {
            const pool = feedbackPool[state.lang][isGood ? 'good' : 'try'];
            return pool[Math.floor(Math.random() * pool.length)];
        }

        function showFeedback(isPositive) {
            const msg = getFeedback(isPositive);
            const toast = document.getElementById('feedback-toast');
            const text = document.getElementById('feedback-text');
            const icon = document.getElementById('feedback-icon');

            text.innerText = msg;
            icon.innerText = isPositive ? "🙌" : "🤝";
            
            toast.className = `fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-white px-8 py-5 rounded-full shadow-2xl border-4 z-40 transition-opacity duration-300 w-max max-w-[90vw] ${isPositive ? 'border-green-400' : 'border-blue-400'}`;
            text.className = `text-2xl font-bold ${isPositive ? 'text-green-700' : 'text-blue-700'}`;
            
            speak(msg, 1.0, 1.3);
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2500);

            if (isPositive) {
                state.stars[state.lang]++;
                saveStars();
                fireConfetti();
            }
        }

        // --- ROUTER ---
        function navigate(view, params = {}) {
            const container = document.getElementById('app-container');
            container.innerHTML = ''; 
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();

            if (params.subject) state.subject = params.subject;
            if (params.grade) {
                state.grade = params.grade;
                state.activityIndex = 0;
            }
            if (params.elaCategory) {
                state.elaCategory = params.elaCategory;
                state.activityIndex = 0;
            }
            if (params.persona) state.persona = params.persona;

            switch(view) {
                case 'hub': renderHub(container); break;
                case 'gradeSelect': renderGradeSelect(container, params.fromHub); break;
                case 'elaHub': renderElaHub(container); break;
                case 'activity': renderActivity(container); break;
                case 'progress': renderProgress(container); break;
            }
        }

        // --- RENDERERS ---
        function renderHub(container) {
            const t = uiText[state.lang];
            const princess = state.princess;
            const introText = `Hello Zoe, I am ${princess.name}`;
            const readingPrincess = getPrincessByName('Belle') || princess;
            const mathPrincess = getPrincessByName('Rapunzel') || princess;
            const sciencePrincess = getPrincessByName('Pocahontas') || princess;
            const spanishPrincess = getPrincessByName('Tiana') || princess;
            container.innerHTML = `
                <div class="home-shell animate-pop">
                    <div class="magic-book" aria-hidden="true">📖</div>
                    <h2 class="home-title">${t.title}</h2>
                    <p class="home-subtitle">${t.hubSub}</p>
                    <div class="princess-greeting-pill">
                        <span aria-hidden="true">👑</span>
                        <span>${introText}${princess.greeting ? ` — ${princess.greeting}` : ''}</span>
                    </div>

                    <div class="subjects-grid">
                        <button onclick="navigate('gradeSelect', {subject: 'ela', persona: 'belle', fromHub: true})" class="subject-card subject-card-blue btn-kid">
                            <span class="subject-label"><span class="subject-icon">📚</span>${t.btnEla}</span>
                            ${renderPrincessImage(readingPrincess, "subject-art")}
                        </button>
                        
                        <button onclick="navigate('gradeSelect', {subject: 'math', persona: 'rapunzel', fromHub: true})" class="subject-card subject-card-pink btn-kid">
                            <span class="subject-label">${t.btnMath}</span>
                            ${renderPrincessImage(mathPrincess, "subject-art")}
                        </button>
                        
                        <button onclick="navigate('gradeSelect', {subject: 'science', persona: 'moana', fromHub: true})" class="subject-card subject-card-green wide btn-kid">
                            <span class="subject-label">${t.btnSci}</span>
                            ${renderPrincessImage(sciencePrincess, "subject-art")}
                        </button>
                        
                        <button onclick="toggleLanguage('es'); navigate('gradeSelect', {subject: 'ela', persona: 'elena', fromHub: true})" class="subject-card subject-card-purple wide btn-kid">
                            <span class="subject-label">${t.btnSpan}</span>
                            ${renderPrincessImage(spanishPrincess, "subject-art")}
                        </button>
                    </div>
                </div>
            `;
            initializePrincessImages(container);
            speak(introText);
        }

        function renderGradeSelect(container, fromHub = false) {
            const t = uiText[state.lang];
            const target = state.subject === 'ela' ? 'elaHub' : 'activity';
            container.innerHTML = `
                <div class="text-center animate-pop max-w-2xl mx-auto mt-10">
                    <button onclick="navigate('hub')" class="absolute top-0 left-0 bg-white/80 backdrop-blur text-slate-700 px-6 py-3 rounded-full font-bold btn-kid text-xl">${t.back}</button>
                    <h2 class="text-4xl font-extrabold text-slate-700 mb-10 mt-16 md:mt-0">${t.gradeTitle}</h2>
                    <div class="flex flex-col space-y-6">
                        <button onclick="navigate('${target}', {grade: 'k'})" class="btn-kid bg-teal-300 hover:bg-teal-400 text-white p-8 rounded-[2rem] text-3xl font-bold border-b-8 border-teal-500">${t.k}</button>
                        <button onclick="navigate('${target}', {grade: 'g1'})" class="btn-kid bg-indigo-300 hover:bg-indigo-400 text-white p-8 rounded-[2rem] text-3xl font-bold border-b-8 border-indigo-500">${t.g1}</button>
                        <button onclick="navigate('${target}', {grade: 'g2'})" class="btn-kid bg-rose-300 hover:bg-rose-400 text-white p-8 rounded-[2rem] text-3xl font-bold border-b-8 border-rose-500">${t.g2}</button>
                    </div>
                </div>
            `;

            if (fromHub && state.persona) {
                const personaVoice = personas[state.lang][state.persona].greeting;
                speak(personaVoice + " " + t.gradeTitle);
            } else {
                speak(t.gradeTitle);
            }
        }

        function renderElaHub(container) {
            const t = uiText[state.lang];
            container.innerHTML = `
                <div class="text-center animate-pop max-w-4xl mx-auto mt-10">
                    <button onclick="navigate('gradeSelect')" class="absolute top-0 left-0 bg-white/80 backdrop-blur text-slate-700 px-6 py-3 rounded-full font-bold btn-kid text-xl">${t.back}</button>
                    <h2 class="text-4xl font-extrabold text-slate-700 mb-10 mt-16 md:mt-0">${t.elaHubTitle}</h2>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-8">
                        <button onclick="navigate('activity', {elaCategory: 'letters'})" class="btn-kid bg-blue-300 hover:bg-blue-400 text-white p-6 rounded-3xl text-2xl font-bold flex items-center justify-between">
                            <span>${t.btnLearnLetters}</span><span class="text-4xl bg-white/30 p-3 rounded-full">🔤</span>
                        </button>
                        <button onclick="navigate('activity', {elaCategory: 'match'})" class="btn-kid bg-pink-300 hover:bg-pink-400 text-white p-6 rounded-3xl text-2xl font-bold flex items-center justify-between">
                            <span>${t.btnMatchSounds}</span><span class="text-4xl bg-white/30 p-3 rounded-full">🧩</span>
                        </button>
                        <button onclick="navigate('activity', {elaCategory: 'blend'})" class="btn-kid bg-purple-300 hover:bg-purple-400 text-white p-6 rounded-3xl text-2xl font-bold flex items-center justify-between">
                            <span>${t.btnBlendWords}</span><span class="text-4xl bg-white/30 p-3 rounded-full">🗣️</span>
                        </button>
                        <button onclick="navigate('activity', {elaCategory: 'sentences'})" class="btn-kid bg-orange-300 hover:bg-orange-400 text-white p-6 rounded-3xl text-2xl font-bold flex items-center justify-between">
                            <span>${t.btnReadSentences}</span><span class="text-4xl bg-white/30 p-3 rounded-full">📖</span>
                        </button>
                        <button onclick="navigate('activity', {elaCategory: 'sight'})" class="btn-kid bg-green-300 hover:bg-green-400 text-white p-6 rounded-3xl text-2xl font-bold flex items-center justify-between md:col-span-2 md:w-2/3 mx-auto">
                            <span>${t.btnSightWords}</span><span class="text-4xl bg-white/30 p-3 rounded-full">👁️</span>
                        </button>
                    </div>
                </div>
            `;
            speak(t.elaHubTitle);
        }

        // --- ENGINE: DYNAMIC RENDERER ---
        function renderActivity(container) {
            const t = uiText[state.lang];
            const princess = state.princess;
            const dataset = state.subject === 'ela'
                ? curriculum[state.lang]?.ela?.[state.grade]?.[state.elaCategory]
                : curriculum[state.lang]?.[state.subject]?.[state.grade];
            if (!dataset || dataset.length === 0) {
                container.innerHTML = `<div class="text-center pt-24"><p class="text-3xl font-bold text-slate-500">✨ More activities coming soon!</p><button onclick="navigate('hub')" class="mt-8 btn-kid bg-yellow-400 text-yellow-900 font-bold text-2xl px-8 py-4 rounded-full">${uiText[state.lang].back}</button></div>`;
                return;
            }
            const data = dataset[Math.min(state.activityIndex, dataset.length - 1)];

            const backTarget = state.subject === 'ela' ? 'elaHub' : 'gradeSelect';
            let html = `<button onclick="navigate('${backTarget}')" class="absolute top-0 left-0 bg-white/80 backdrop-blur text-slate-700 px-6 py-3 rounded-full font-bold btn-kid text-xl z-20">${t.back}</button>`;
            html += `<div class="absolute top-0 right-0 mt-0 mr-0 md:mt-1 md:mr-1 flex items-center gap-2 rounded-full border bg-white/90 px-3 py-2 shadow-md backdrop-blur-sm" style="border-color: ${princess.themeColor};">
                        ${renderPrincessImage(princess, "h-10 w-10 rounded-full object-cover border border-white shadow-sm")}
                        <span class="hidden sm:inline text-sm font-bold text-slate-700">${princess.name}</span>
                    </div>`;
            
            // Layout Shell
            html += `<div class="animate-pop text-center max-w-3xl mx-auto pt-16 md:pt-10">`;

            if (data.type === 'flashcard') {
                html += `
                    <div class="bg-white border-4 border-blue-200 rounded-[3rem] p-10 shadow-xl mb-10 cursor-pointer hover:bg-blue-50 transition" onclick='speak(${jsString(data.audio)})'>
                        <div class="text-8xl md:text-9xl font-black text-slate-800 tracking-widest">${data.item}</div>
                        <div class="mt-8 text-8xl">${data.emoji}</div>
                        <div class="text-4xl font-bold text-slate-600 mt-6">${data.desc}</div>
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                        <button onclick='speak(${jsString(data.audio)})' class="btn-kid bg-yellow-400 text-yellow-900 font-bold text-2xl py-6 rounded-[2rem] flex items-center justify-center space-x-2">
                            <span>🔊</span> <span>${t.read}</span>
                        </button>
                        <button onclick="nextActivity()" class="btn-kid bg-blue-400 hover:bg-blue-500 text-white font-bold text-2xl py-6 rounded-[2rem]">${t.next}</button>
                    </div>
                `;
                speak(data.audio);
            } 
            else if (data.type === 'quiz') {
                // Randomize options
                const opts = [...data.options].sort(() => Math.random() - 0.5);
                html += `
                    <div class="bg-white border-4 border-pink-200 rounded-[3rem] p-8 shadow-xl mb-10 cursor-pointer" onclick='speak(${jsString(data.audio)})'>
                        <p class="text-4xl font-extrabold text-slate-800 mb-4">${data.q}</p>
                        ${data.emoji ? `<div class="text-7xl mt-4">${data.emoji}</div>` : ''}
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        ${opts.map((opt) => `
                            <button onclick='handleQuizAnswer(${jsString(opt)}, ${jsString(data.a)})' class="btn-kid bg-white border-4 border-slate-200 hover:border-pink-300 rounded-[2rem] p-8 text-3xl font-bold text-slate-700">
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                `;
                speak(data.audio);
            }
            else if (data.type === 'blend') {
                html += `
                    <div class="text-9xl mb-8 animate-bounce-slight">${data.emoji}</div>
                    <div class="flex flex-wrap justify-center gap-4 mb-10">
                        ${data.sounds.map((sound, i) => `
                            <button onclick='speak(${jsString(data.phonemes[i])})' class="btn-kid w-24 h-24 md:w-32 md:h-32 bg-white border-4 border-purple-200 rounded-[2rem] text-5xl md:text-7xl font-bold text-slate-700 flex items-center justify-center hover:bg-purple-50">
                                ${sound}
                            </button>
                        `).join('')}
                    </div>
                    <div class="flex flex-col space-y-6 max-w-sm mx-auto">
                        <button onclick='speak(${jsString(data.item)})' class="btn-kid bg-purple-400 hover:bg-purple-500 text-white font-bold text-3xl py-6 rounded-full flex items-center justify-center space-x-3">
                            <span>🗣️</span> <span>${t.read}</span>
                        </button>
                        <button onclick="nextActivity()" class="btn-kid bg-slate-200 text-slate-700 font-bold text-2xl py-5 rounded-full">${t.next}</button>
                    </div>
                `;
                speak("Tap the sounds, then read the word!");
            }
            else if (data.type === 'sentence') {
                const words = data.text.split(' ');
                html += `
                    <div class="bg-white p-8 rounded-[3rem] shadow-lg border-4 border-orange-100 flex flex-wrap justify-center gap-4 mb-12">
                        ${words.map(w => {
                            const cleanWord = w.replace(/[^\w\sáéíóúüñ]/gi, ""); 
                            return `
                                <button onclick='speak(${jsString(cleanWord)})' class="text-5xl md:text-6xl font-bold text-slate-800 hover:text-orange-400 transition-colors p-2 rounded-xl hover:bg-orange-50">
                                    ${w}
                                </button>
                            `;
                        }).join('')}
                    </div>
                    <div class="flex justify-center space-x-6">
                        <button onclick='speak(${jsString(data.audio || data.text)})' class="btn-kid bg-yellow-400 text-yellow-900 font-bold text-2xl px-8 py-6 rounded-full flex items-center space-x-3">
                            <span>🔊</span> <span>${t.read}</span>
                        </button>
                        <button onclick="nextActivity()" class="btn-kid bg-orange-400 hover:bg-orange-500 text-white font-bold text-2xl px-8 py-6 rounded-full">${t.next}</button>
                    </div>
                `;
                speak(state.lang === 'en' ? "Tap a word to hear it." : "Toca una palabra para escucharla.");
            }

            html += `</div>`;
            container.innerHTML = html;
            initializePrincessImages(container);
        }

        window.nextActivity = function() {
            const list = state.subject === 'ela'
                ? (curriculum[state.lang]?.ela?.[state.grade]?.[state.elaCategory] || [])
                : (curriculum[state.lang]?.[state.subject]?.[state.grade] || []);
            if (list.length === 0) { navigate(state.subject === 'ela' ? 'elaHub' : 'gradeSelect'); return; }
            const nextIndex = (state.activityIndex + 1) % list.length;
            const wrapped = nextIndex < state.activityIndex || (state.activityIndex === 0 && list.length === 1);
            state.activityIndex = nextIndex;
            if (wrapped && list.length > 1) {
                // Brief "round complete" toast before re-rendering
                const toast = document.createElement('div');
                toast.textContent = state.lang === 'en' ? '🌟 Round complete! Starting over…' : '🌟 ¡Ronda completa! Empezando de nuevo…';
                toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fbbf24;color:#1e3a5f;padding:1rem 2rem;border-radius:2rem;font-size:1.5rem;font-weight:bold;z-index:999;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,0.2);';
                document.body.appendChild(toast);
                setTimeout(() => { document.body.removeChild(toast); navigate('activity'); }, 1400);
            } else {
                navigate('activity');
            }
        }

        window.handleQuizAnswer = function(selected, target) {
            if (selected === target) {
                showFeedback(true);
                setTimeout(nextActivity, 1800);
            } else {
                showFeedback(false);
            }
        };

        function renderProgress(container) {
            const t = uiText[state.lang];
            const princess = state.princess;
            const currentCount = state.stars[state.lang];
            
            container.innerHTML = `
                <div class="animate-pop text-center max-w-2xl mx-auto pt-10">
                    <button onclick="navigate('hub')" class="absolute top-0 left-0 bg-white/80 backdrop-blur text-slate-700 px-6 py-3 rounded-full font-bold btn-kid text-xl">${t.back}</button>
                    <h2 class="text-4xl font-bold text-yellow-500 mb-10 mt-16 md:mt-0">${t.progress}</h2>
                    <div class="mb-6 flex justify-center">
                        <div class="rounded-[2rem] border-4 bg-white/95 p-3 shadow-lg" style="border-color: ${princess.themeColor};">
                            ${renderPrincessImage(princess, "h-28 w-28 md:h-32 md:w-32 rounded-[1.5rem] object-cover bg-white")}
                        </div>
                    </div>
                    <div class="bg-white border-4 border-yellow-300 rounded-[3rem] p-10 shadow-xl mb-10">
                        <div class="text-9xl mb-6">🏆</div>
                        <h3 class="text-5xl font-black text-slate-800 mb-4">${currentCount} ⭐</h3>
                        <p class="text-2xl text-slate-600 font-semibold">${state.lang === 'en' ? "You are a learning champion!" : "¡Eres un campeón del aprendizaje!"}</p>
                    </div>
                </div>
            `;
            initializePrincessImages(container);
            speak(`${currentCount} stars!`);
        }

        // --- FX ---
        function fireConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            canvas.classList.remove('hidden');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const pieces = [];
            const colors = ['#f87171', '#fbbf24', '#34d399', '#60a5fa', '#a78bfa'];
            for (let i = 0; i < 100; i++) pieces.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height - canvas.height, w: Math.random() * 12 + 6, h: Math.random() * 12 + 6, color: colors[Math.floor(Math.random() * colors.length)], speed: Math.random() * 4 + 2, angle: Math.random() * 360, spin: Math.random() * 5 - 2.5 });
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height); let active = false;
                pieces.forEach(p => {
                    p.y += p.speed; p.angle += p.spin; ctx.save(); ctx.translate(p.x, p.y); ctx.rotate((p.angle * Math.PI) / 180); ctx.fillStyle = p.color; ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h); ctx.restore();
                    if (p.y < canvas.height) active = true;
                });
                if (active) requestAnimationFrame(animate); else canvas.classList.add('hidden');
            }
            animate();
        }

        // Boot
        window.onload = init;
    </script>
    </div>
</body>
</html>
